<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onshift // Dashboard de Autogestión - Hotel Alex</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Estilos Base y Minimalismo Sensorial */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background-color: #f4f6f8; color: #2b2f33; min-height: 100vh; }
        
        /* Login */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f6f8; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-card { background: #fff; padding: 40px; width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .btn-login { width: 100%; padding: 14px; background: #0f172a; color: #ffffff; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 20px; }

        /* Dashboard */
        #app-main { display: none; padding: 40px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 20px; }
        .calendar-cell { background: #ffffff; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; }
        .calendar-cell:hover { background: #f8fafc; }
        .cell-top-bar { display: flex; justify-content: space-between; align-items: flex-start; }
        
        /* Badges y Estados */
        .status-text { font-size: 0.6rem; font-weight: 600; text-transform: uppercase; margin-top: 2px; display: block; color: #64748b; }
        .clickup-badge { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
        .status-not-started { background-color: #ef4444; }
        .status-in-progress { background-color: #eab308; }
        .status-ready { background-color: #22c55e; }
    </style>
</head>
<body>

    <!-- Pantalla de Login -->
    <div class="login-overlay" id="login-screen">
        <div class="login-card">
            <h2>Dashboard Autogestión</h2>
            <div style="margin-top:20px; text-align:left;">
                <label>Usuario</label>
                <input type="text" id="username" style="width:100%; padding:10px; margin-top:5px;">
            </div>
            <div style="margin-top:15px; text-align:left;">
                <label>Contraseña</label>
                <input type="password" id="password" style="width:100%; padding:10px; margin-top:5px;">
            </div>
            <button class="btn-login" onclick="loginUser()">Ingresar al Sistema</button>
        </div>
    </div>

    <!-- Dashboard -->
    <main id="app-main">
        <h1>Cronograma de Contenidos</h1>
        <div class="calendar-grid" id="calendar-container">
            <!-- JS Genera las celdas aquí -->
        </div>
    </main>

    <script>
        // Lógica de Login
        function loginUser() {
            const user = document.getElementById('username').value;
            if (user === "admin") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-main').style.display = 'block';
            } else {
                alert("Usuario incorrecto");
            }
        }

        // Generar Calendario
        const container = document.getElementById('calendar-container');
        for(let i=1; i<=30; i++) {
            container.innerHTML += `
                <div class="calendar-cell" onclick="updateStatus(${i})">
                    <div class="cell-top-bar">
                        <strong>${i}</strong>
                        <div style="text-align:right;">
                            <span class="clickup-badge status-not-started" id="badge-${i}"></span>
                            <span class="status-text" id="text-${i}">No iniciado</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // Lógica para cambiar estado al hacer clic
        function updateStatus(day) {
            const badge = document.getElementById(`badge-${day}`);
            const text = document.getElementById(`text-${day}`);
            
            // Ciclo simple: Not started -> In progress -> Ready
            if(badge.classList.contains('status-not-started')) {
                badge.className = 'clickup-badge status-in-progress';
                text.textContent = 'En proceso';
            } else if(badge.classList.contains('status-in-progress')) {
                badge.className = 'clickup-badge status-ready';
                text.textContent = 'Listo';
            } else {
                badge.className = 'clickup-badge status-not-started';
                text.textContent = 'No iniciado';
            }
        }
    </script>
</body>
</html>
