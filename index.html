<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onshift // Portal de Autogestión - Hotel Alex</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Paleta Hotel Alex */
        :root {
            --alex-beige: #e5e1d8;
            --alex-gris: #949391;
            --alex-negro: #1a1a18;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #fdfdfc; color: var(--alex-negro); display: flex; min-height: 100vh; }

        /* LOGIN */
        .login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--alex-beige); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-card { background: var(--white); padding: 40px; width: 400px; border-radius: 4px; text-align: center; border: 1px solid var(--alex-gris); }
        .btn-login { background-color: var(--alex-negro); color: var(--alex-beige); border: none; padding: 14px; width: 100%; cursor: pointer; font-weight: 700; text-transform: uppercase; }

        /* SIDEBAR */
        .sidebar { width: 280px; background: var(--white); border-right: 1px solid var(--alex-beige); padding: 40px; display: none; flex-direction: column; }
        .menu-btn { background: none; border: none; padding: 15px 0; font-weight: 700; color: var(--alex-gris); text-transform: uppercase; text-align: left; cursor: pointer; }
        .menu-btn.active { color: var(--alex-negro); border-bottom: 1px solid var(--alex-negro); }

        /* MAIN */
        .main-container { flex-grow: 1; padding: 40px; display: none; }
        .app-section { display: none; }
        .app-section.active-section { display: block; }

        /* CALENDARIO ESTILO ALEX */
        .calendar-container { background: var(--white); border: 1px solid var(--alex-beige); border-radius: 4px; }
        .calendar-month-title { padding: 20px; font-size: 1.2rem; font-weight: 700; border-bottom: 2px solid var(--alex-negro); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .calendar-cell { border-right: 1px solid var(--alex-beige); border-bottom: 1px solid var(--alex-beige); padding: 10px; min-height: 140px; cursor: pointer; }
        
        /* BLOQUES CORPORATIVOS */
        .post-item { padding: 6px; font-size: 0.7rem; font-weight: 700; margin-bottom: 4px; text-transform: uppercase; }
        .post-reel { background-color: var(--alex-negro); color: var(--alex-beige); }
        .post-story { background-color: var(--alex-gris); color: var(--white); }
        .post-carrusel { background-color: var(--alex-beige); color: var(--alex-negro); }

        /* MODAL */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .work-modal-card { background: var(--white); padding: 40px; width: 500px; border-radius: 4px; }
        .btn-action-view-art { background-color: var(--alex-negro); color: var(--alex-beige); padding: 12px; display: block; text-align: center; text-decoration: none; font-weight: 700; text-transform: uppercase; }

        /* MÓVIL */
        @media (max-width: 991px) { .sidebar { position: fixed; bottom: 0; width: 100%; flex-direction: row; justify-content: space-around; } }
    </style>
</head>
<body>

    <div class="login-overlay" id="login-screen">
        <div class="login-card">
            <h2>Portal Hotel Alex</h2>
            <input type="text" id="username" placeholder="Usuario" style="width:100%; padding:10px; margin:20px 0;">
            <button class="btn-login" onclick="document.getElementById('login-screen').style.display='none'; document.getElementById('app-sidebar').style.display='flex'; document.getElementById('app-content').style.display='block';">Ingresar</button>
        </div>
    </div>

    <nav class="sidebar" id="app-sidebar">
        <button class="menu-btn active" onclick="showSection('cronograma-section')">Cronograma</button>
        <button class="menu-btn" onclick="showSection('metricas-section')">Métricas</button>
    </nav>

    <main class="main-container" id="app-content">
        <section id="cronograma-section" class="app-section active-section">
            <div class="calendar-container">
                <div class="calendar-month-title">Junio 2026</div>
                <div class="calendar-grid">
                    <script>
                        for(let i=1; i<=30; i++) {
                            document.write(`<div class="calendar-cell" onclick="openWorkModal(${i})">
                                <div style="font-weight:700; margin-bottom:5px;">${i}</div>
                                <div id="content-${i}"></div>
                            </div>`);
                        }
                    </script>
                </div>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="work-modal">
        <div class="work-modal-card">
            <h3 id="wm-title">Gestión del día</h3>
            <textarea style="width:100%; margin:20px 0;" rows="3"></textarea>
            <a href="#" class="btn-action-view-art" onclick="closeWorkModal()">Ver Diseños</a>
        </div>
    </div>

    <script>
        function openWorkModal(day) { document.getElementById('work-modal').style.display = 'flex'; }
        function closeWorkModal() { document.getElementById('work-modal').style.display = 'none'; }
        function showSection(id) { /* Lógica de secciones */ }
    </script>
</body>
</html>
