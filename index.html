<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Hotel Alex</title>
    <style>
        /* CSS: Estilos base y diseño minimalista */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background-color: #f4f6f8; color: #2b2f33; }
        
        /* Login */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f6f8; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-card { background: #fff; padding: 40px; width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .login-logo { height: 100px; margin-bottom: 24px; object-fit: contain; }
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 600; color: #475569; text-transform: uppercase; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; }
        
        /* Calendario */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; padding: 20px; }
        .calendar-cell { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; cursor: pointer; }
        .status-text { font-size: 0.6rem; font-weight: 600; text-transform: uppercase; margin-top: 5px; display: block; }
    </style>
</head>
<body>

    <div class="login-overlay" id="login-screen">
        <div class="login-card">
            <img src="img/hotelalex_color.png" alt="Hotel Alex" class="login-logo">
            <p style="font-size: 0.75rem; color: #64748b; margin-bottom: 20px;">Ingresa tus credenciales</p>
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="username">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password">
            </div>
            <button onclick="console.log('Login')" style="width:100%; padding: 12px; border:none; background:#0f172a; color:#fff; border-radius:10px; cursor:pointer;">Ingresar</button>
        </div>
    </div>

    <main id="app-main" style="display:none;">
        <h1>Calendario de Tareas</h1>
        <div class="calendar-grid" id="calendar-container">
            </div>
    </main>

    <script>
        // Lógica inicial para generar el calendario
        const container = document.getElementById('calendar-container');
        for(let i=1; i<=30; i++) {
            container.innerHTML += `
                <div class="calendar-cell">
                    <strong>${i}</strong>
                    <span class="status-text" id="status-${i}">No iniciado</span>
                </div>
            `;
        }
    </script>
</body>
</html>
